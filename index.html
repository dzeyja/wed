<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ayazhan QYZ UZATU</title>

  <!-- Похожие шрифты с Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="deck">
    <section class="card">
      <div class="mute-chip">әуенді өшіру</div>

      <div class="name">Ayazhan</div>
      <div class="subtitle">QYZ UZATU</div>

      <div class="left-medallion" aria-hidden="true"></div>

      <div class="photo-arc-wrapper">
        <div class="photo-arc"></div>

        <svg class="arc-text-svg" viewBox="0 0 200 200">
          <defs>
            <path id="textCircle" d="M100,12 A88,88 0 1,1 99.99,12" />
          </defs>
          <text class="arc-text">
            <textPath href="#textCircle" startOffset="0%">
              qyz uzatu · qyz uzatu · qyz uzatu · qyz uzatu · qyz uzatu · qyz uzatu · qyz uzatu ·
            </textPath>
          </text>
        </svg>
      </div>

      <div class="date">
        <span>30</span>
        <span>30</span>
        <span>08</span>
        <span>25</span>
      </div>

    </section>

    <section class="card card--page2">

      <div class="page2-photo-wrap">
      </div>

      <div class="page2-content">
        <h1 class="page2-title">Құрметті қонақтар!</h1>

        <p class="page2-text">
          Ағайын-туыс, бауырлар,<br />
          құда-жекжат, нағашы-жиен,<br />
          әпке-жеңгелер, әріптестер,<br />
          сыныптастар, көршілер!
        </p>
      </div>

    </section>

    <section class="card card--page3">

      <div class="page3-top-text">Сіздерді аяулы қызымыз</div>

      <div class="page3-name">Аяжанның</div>

      <div class="page3-invite">
        ұзату тойына арналған<br />
        ақ дастарханымыздың<br />
        қадірлі қонағы болуға<br />
        шақырамыз!
      </div>

      <div class="date page3-date">
        <span>30</span>
        <span>30</span>
        <span>08</span>
        <span>25</span>
      </div>

      <div class="page3-circle"></div>

      <svg class="page3-arc-svg" viewBox="0 0 200 200">
        <defs>
          <path id="textCircle3" d="M100,12 A88,88 0 1,1 99.99,12" />
        </defs>
        <text class="arc-text">
          <textPath href="#textCircle3" startOffset="0%">
            qyz uzatu · qyz uzatu · qyz uzatu · qyz uzatu · qyz uzatu · qyz uzatu · qyz uzatu ·
          </textPath>
        </text>
      </svg>

      <div class="logo">
        <div class="logo-inner">AQBOSA</div>
      </div>
    </section>
  </div>
</body>
</html>
